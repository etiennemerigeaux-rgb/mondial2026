<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pronos Coupe du Monde 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        padding: 20px;
        margin: 0;
      }
      .container {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 25px;
      }
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: fit-content;
      }
      h2 {
        color: #1a365d;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
        margin-top: 0;
      }

      /* Styles des phases et des blocs matchs */
      .phase-header {
        background: #1a365d;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 25px;
        font-weight: bold;
        font-size: 1.1em;
      }
      .match-box {
        padding: 12px 0;
        border-bottom: 1px solid #edf2f7;
      }
      .match-date {
        font-size: 12px;
        color: #718096;
        margin-bottom: 5px;
        font-weight: 500;
      }
      .match-teams {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .team {
        width: 35%;
        font-weight: 600;
        color: #2d3748;
      }
      .team.right {
        text-align: right;
      }
      .inputs {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .input-prono {
        width: 40px;
        height: 32px;
        text-align: center;
        font-size: 15px;
        border: 2px solid #cbd5e1;
        border-radius: 6px;
        font-weight: bold;
      }
      .real-score {
        font-size: 11px;
        color: #e53e3e;
        font-weight: bold;
        display: block;
        text-align: center;
        margin-top: 2px;
      }

      .input-user {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 2px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 15px;
        background: #3182ce;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        position: sticky;
        bottom: 20px;
        box-shadow: 0 4px 10px rgba(49, 130, 206, 0.3);
      }
      .btn:hover {
        background: #2b6cb0;
      }

      /* Classement */
      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      .leaderboard-table th,
      .leaderboard-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
      }
      .leaderboard-table th {
        background: #f7fafc;
        color: #4a5568;
      }
      .rank-1 {
        background: #fef3c7;
        font-weight: bold;
      }
      .zone-scroll {
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 5px;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center; color: #1a365d; margin-bottom: 30px">
      🏆 Pronos &amp; Classement - Mondial 2026
    </h1>

    <div class="container">
      <div class="card">
        <h2>✍️ Mes Pronostics</h2>
        <input
          type="text"
          id="username"
          class="input-user"
          placeholder="Entrez votre Pseudo (ex: Thomas)"
        />

        <div class="zone-scroll" id="zone-matchs">
          Chargement des 104 matchs et des dates en cours...
        </div>

        <button class="btn" onclick="sauvegarderEtCalculer()">
          Enregistrer mon score
        </button>
      </div>

      <div class="card" style="position: sticky; top: 20px">
        <h2>📊 Classement des Collègues</h2>
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rang</th>
              <th>Pseudo</th>
              <th>Points</th>
            </tr>
          </thead>
          <tbody id="zone-classement">
            <tr>
              <td colspan="3">Chargement du classement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      // --- CONFIGURATION DE VOS APIS ---
      const FOOTBALL_API_KEY = "6582850a7c2d4df392645f1c813dc0a4";
      const SUPABASE_URL = "https://jrjphgwnhmyjtywqcude.supabase.co";
      const SUPABASE_KEY =
        "yJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyanBoZ3duaG15anR5d3FjdWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTIzOTUsImV4cCI6MjA5NjA4ODM5NX0.tOVLHP6ps68tSxQxv3f7GHq8dA54wXPQwyhJBrsViAU";

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let listeMatchs = [];

      // Traduction des étapes de la compétition fournies par l'API
      const traductionPhases = {
        GROUP_STAGE: "Phases de Groupes",
        LAST_32: "Seizièmes de finale (Nouveau)",
        LAST_16: "Huitièmes de finale",
        QUARTER_FINALS: "Quarts de finale",
        SEMI_FINALS: "Demi-finales",
        THIRD_PLACE: "Match pour la 3ème place",
        FINAL: "🏆 FINALE",
      };

      // 1. Charger les matchs depuis l'API Football
      async function chargerMatchs() {
        try {
          const response = await fetch(
            `https://api.football-data.org/v4/competitions/WC/matches`,
            {
              headers: { "X-Auth-Token": FOOTBALL_API_KEY },
            },
          );
          const data = await response.json();

          // Tri des matchs par date chronologique
          listeMatchs = data.matches.sort(
            (a, b) => new Date(a.utcDate) - new Date(b.utcDate),
          );
          afficherMatchsParPhases();
        } catch (error) {
          document.getElementById("zone-matchs").innerHTML =
            "Erreur lors de la récupération du calendrier des matchs. Vérifiez votre clé API Football-Data.";
        }
      }

      // 2. Regrouper et afficher les matchs par étape avec la date formatée
      function afficherMatchsParPhases() {
        let html = "";
        let dernierePhaseAffichee = "";

        listeMatchs.forEach((match, index) => {
          // Si on change de phase (ex: on passe des Groupes aux Seizièmes), on crée un titre de section
          let nomPhaseFr = traductionPhases[match.stage] || match.stage;
          if (nomPhaseFr !== dernierePhaseAffichee) {
            html += `<div class="phase-header">${nomPhaseFr}</div>`;
            dernierePhaseAffichee = nomPhaseFr;
          }

          // Formatage de la date du match en français (ex: "vendredi 12 juin à 21:00")
          let dateMatch = new Date(match.utcDate);
          let optionsDate = { weekday: "long", day: "numeric", month: "long" };
          let optionsHeure = { hour: "2-digit", minute: "2-digit" };
          let dateFormatee =
            dateMatch.toLocaleDateString("fr-FR", optionsDate) +
            " - " +
            dateMatch.toLocaleTimeString("fr-FR", optionsHeure);

          // Récupération des scores réels si le match est fini
          let s1Reel =
            match.score.fullTime.home !== null
              ? match.score.fullTime.home
              : "-";
          let s2Reel =
            match.score.fullTime.away !== null
              ? match.score.fullTime.away
              : "-";

          html += `
        <div class="match-box">
            <div class="match-date">${dateFormatee.toUpperCase()}</div>
            <div class="match-teams">
                <div class="team">${match.homeTeam.name || "À déterminer"}</div>
                <div class="inputs">
                    <div>
                        <input type="number" id="p1_${index}" class="input-prono" min="0">
                        <span class="real-score">R: ${s1Reel}</span>
                    </div>
                    <span style="color:#cbd5e1; font-weight:bold; margin: 0 4px;">:</span>
                    <div>
                        <input type="number" id="p2_${index}" class="input-prono" min="0">
                        <span class="real-score">R: ${s2Reel}</span>
                    </div>
                </div>
                <div class="team right">${match.awayTeam.name || "À déterminer"}</div>
            </div>
        </div>`;
        });

        document.getElementById("zone-matchs").innerHTML = html;
      }

      // 3. Calculer le score et mettre à jour le classement général
      async function sauvegarderEtCalculer() {
        const pseudo = document.getElementById("username").value.trim();
        if (!pseudo) {
          alert(
            "Veuillez entrer votre pseudo avant de sauvegarder vos pronostics !",
          );
          return;
        }

        let pointsDuJoueur = 0;

        listeMatchs.forEach((match, index) => {
          let p1 = parseInt(document.getElementById(`p1_${index}`).value);
          let p2 = parseInt(document.getElementById(`p2_${index}`).value);
          let r1 = match.score.fullTime.home;
          let r2 = match.score.fullTime.away;

          // On ne calcule que les matchs terminés où le collègue a fait une proposition
          if (r1 !== null && r2 !== null && !isNaN(p1) && !isNaN(p2)) {
            if (p1 === r1 && p2 === r2) {
              pointsDuJoueur += 4; // Score exact
            } else if (
              (p1 > p2 && r1 > r2) ||
              (p1 < p2 && r1 < r2) ||
              (p1 === p2 && r1 === r2)
            ) {
              pointsDuJoueur += 3; // Bon vainqueur ou Nul
            } else {
              pointsDuJoueur += 1; // Match perdu
            }
          }
        });

        // Envoi des données sur Supabase (écrase l'ancien score du même pseudo)
        const { error } = await supabase
          .from("classement")
          .upsert(
            { username: pseudo, points: pointsDuJoueur },
            { onConflict: "username" },
          );

        if (error) {
          alert(
            "Une erreur est survenue lors de la sauvegarde : " + error.message,
          );
        } else {
          alert(
            `Parfait ${pseudo} ! Tes pronos sont enregistrés. Ton score actuel calculé est de ${pointsDuJoueur} points.`,
          );
          chargerClassement();
        }
      }

      // 4. Charger le classement en direct
      async function chargerClassement() {
        const { data, error } = await supabase
          .from("classement")
          .select("username, points")
          .order("points", { ascending: false });

        if (error) {
          console.error(error);
          return;
        }

        let html = "";
        data.forEach((joueur, i) => {
          let rowClass = i === 0 ? "rank-1" : "";
          html += `
        <tr class="${rowClass}">
            <td><strong>${i + 1}</strong></td>
            <td>${joueur.username}</td>
            <td><strong>${joueur.points} pts</strong></td>
        </tr>`;
        });

        document.getElementById("zone-classement").innerHTML =
          html ||
          "<tr><td colspan='3'>Aucun joueur enregistré pour le moment.</td></tr>";
      }

      // Initialisation au chargement
      chargerMatchs();
      chargerClassement();
    </script>
  </body>
</html>
