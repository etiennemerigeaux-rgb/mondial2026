<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pronos Mondial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .match-box { padding: 10px; border-bottom: 1px solid #ccc; }
        #log { color: red; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🏆 Pronos Mondial 2026</h1>
    <div id="log"></div>
    <div class="card">
        <h2>Mes Pronostics</h2>
        <div id="liste-matchs">Chargement des données...</div>
        <button onclick="alert('Enregistré !')">Enregistrer</button>
    </div>

    <script>
        const log = (msg) => document.getElementById('log').innerText = msg;
        
        async function init() {
            try {
                // Test de connexion basique
                const response = await fetch("https://api.football-data.org/v4/competitions/WC/matches", {
                    headers: { 'X-Auth-Token': "6582850a7c2d4df392645f1c813dc0a4" }
                });
                
                if (!response.ok) throw new Error("Erreur API : " + response.status);
                
                const data = await response.json();
                const container = document.getElementById('liste-matchs');
                container.innerHTML = "";
                
                data.matches.slice(0, 5).forEach(m => {
                    container.innerHTML += `<div class="match-box">${m.homeTeam.name} vs ${m.awayTeam.name}</div>`;
                });
                log("Succès : Connexion établie !");
            } catch (e) {
                log("Erreur : " + e.message);
            }
        }
        init();
    </script>
</body>
</html>
