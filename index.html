<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pronos Mondial 2026</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .match-box { padding: 10px; border-bottom: 1px solid #ccc; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🏆 Pronos Mondial 2026</h1>
    <div id="status" style="color: blue;">Initialisation...</div>
    <div class="card">
        <h2>Mes Pronostics</h2>
        <div id="liste-matchs">En attente de connexion...</div>
    </div>

    <script>
        const API_KEY = "6582850a7c2d4df392645f1c813dc0a4";
        // Le proxy "allorigins" permet de contourner le blocage CORS
        const PROXY = "https://api.allorigins.win/get?url=";
        const TARGET = encodeURIComponent("https://api.football-data.org/v4/competitions/WC/matches");

        async function chargerMatchs() {
            try {
                document.getElementById('status').innerText = "Connexion via Proxy...";
                const response = await fetch(PROXY + TARGET, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                
                const data = await response.json();
                // AllOrigins renvoie les données dans un champ 'contents'
                const matchData = JSON.parse(data.contents);

                const container = document.getElementById('liste-matchs');
                container.innerHTML = "";
                
                matchData.matches.slice(0, 10).forEach(m => {
                    container.innerHTML += `<div class="match-box">
                        ${m.homeTeam.name} vs ${m.awayTeam.name}
                    </div>`;
                });
                document.getElementById('status').innerText = "Succès : Liste chargée !";
                document.getElementById('status').style.color = "green";
            } catch (e) {
                document.getElementById('status').innerText = "Erreur : " + e.message;
                document.getElementById('status').style.color = "red";
            }
        }
        chargerMatchs();
    </script>
</body>
</html>
